name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    # Advisory only: loose config in .markdownlint-cli2.jsonc, and the job
    # never fails the gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"

  aislop:
    name: AI Slop Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: aislop Quality Gate
        uses: scanaislop/aislop@v0.10.2

  conformance:
    name: Bus + Adapter Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Git identity for conformance fixture repos
        run: |
          git config --global user.email "ci@commandr.invalid"
          git config --global user.name "Commandr CI"
      - name: Bus tools conformance (C01-C28)
        run: |
          CLAIM_CMD=$PWD/bin/claim COMPLETE_CMD=$PWD/bin/complete \
          GATE_CMD=$PWD/bin/pre-commit-gate PROGRESS_CMD=$PWD/bin/progress \
          COUNCIL_CMD=$PWD/bin/council INDEX_CMD=$PWD/bin/index \
          ANNOT_WRITE_CMD=$PWD/bin/annotate-write \
          protocol/conformance.sh
      - name: Claude Code adapter conformance (C13 drive)
        run: |
          CLAIM_CMD=$PWD/bin/claim COMPLETE_CMD=$PWD/bin/complete \
          GATE_CMD=$PWD/bin/pre-commit-gate PROGRESS_CMD=$PWD/bin/progress \
          COUNCIL_CMD=$PWD/bin/council INDEX_CMD=$PWD/bin/index \
          ANNOT_WRITE_CMD=$PWD/bin/annotate-write \
          protocol/conformance.sh --adapter "$PWD/adapters/claude-code/conformance-driver.sh"
      - name: OpenCode adapter conformance (C13 drive)
        run: |
          CLAIM_CMD=$PWD/bin/claim COMPLETE_CMD=$PWD/bin/complete \
          GATE_CMD=$PWD/bin/pre-commit-gate PROGRESS_CMD=$PWD/bin/progress \
          COUNCIL_CMD=$PWD/bin/council INDEX_CMD=$PWD/bin/index \
          ANNOT_WRITE_CMD=$PWD/bin/annotate-write \
          protocol/conformance.sh --adapter "$PWD/adapters/opencode/conformance-driver.sh"

  copilot-review:
    name: Request Copilot Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # Best-effort: requires Copilot code review to be available on the repo.
      # The durable setup is the repo ruleset "Automatically request Copilot
      # code review" — this job is the scripted fallback. Never blocks the gate.
      - name: Request Copilot reviewer on this PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-reviewer copilot
